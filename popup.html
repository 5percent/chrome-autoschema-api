<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoSchema</title>
    <style>
      :root {
        --bg: #0f172a;
        --fg: #e2e8f0;
        --muted: #94a3b8;
        --accent: #22c55e;
      }
      body {
        margin: 0;
        font-family: "SF Pro Text", "PingFang SC", sans-serif;
        width: 320px;
        background: radial-gradient(circle at top right, #1e293b, #0f172a 60%);
        color: var(--fg);
      }
      .wrap {
        padding: 14px;
      }
      h1 {
        margin: 0;
        font-size: 16px;
      }
      p {
        margin: 8px 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }
      .pill {
        display: inline-block;
        margin-top: 6px;
        background: rgba(34, 197, 94, 0.16);
        color: var(--accent);
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 12px;
      }
      button {
        width: 100%;
        margin-top: 10px;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 600;
      }
      #openSidebar {
        background: #22c55e;
        color: #052e16;
      }
      #clearData {
        background: #334155;
        color: var(--fg);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>AutoSchema API Collector</h1>
      <p>自动采集当前浏览行为中的 API 请求，推断请求/响应 schema，并按域名分组导出。</p>
      <span class="pill" id="status">准备中...</span>
      <button id="openSidebar">打开侧边面板</button>
      <button id="clearData">清空本地采集数据</button>
    </div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
